<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head">
    <title>Employees</title>
</head>
<body>
    <div th:replace="fragments/header :: body"></div>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Employees</h2>
            <a href="/employees/add" class="btn btn-primary">Add Employee</a>
        </div>

        <form class="mb-3" action="/employees" method="get">
            <div class="input-group">
                <input type="text" class="form-control" name="q" placeholder="Search by name, email or department" th:value="${q}" />
                <button class="btn btn-outline-secondary" type="submit">Search</button>
            </div>
        </form>

        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Department</th>
                                <th>Designation</th>
                                <th>Joining</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="e, iter : ${employees}">
                                <td th:text="${iter.index + 1}">1</td>
                                <td th:text="${e.fullName}">Name</td>
                                <td th:text="${e.email}">email</td>
                                <td th:text="${e.department}">Dept</td>
                                <td th:text="${e.designation}">Role</td>
                                <td th:text="${e.joiningDate}">2023-01-01</td>
                                <td>
                                    <a th:href="@{/employees/{id}(id=${e.id})}" class="btn btn-sm btn-outline-primary">View</a>
                                    <a th:href="@{/employees/delete/{id}(id=${e.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete employee?');">Delete</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
