<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head">
    <title>Employee Details</title>
</head>
<body>
    <div th:replace="fragments/header :: body"></div>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <h2>Employee Details</h2>
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${employee.fullName}">Full Name</h5>
                        <p class="card-text"><strong>Email:</strong> <span th:text="${employee.email}"></span></p>
                        <p class="card-text"><strong>Department:</strong> <span th:text="${employee.department}"></span></p>
                        <p class="card-text"><strong>Designation:</strong> <span th:text="${employee.designation}"></span></p>
                        <p class="card-text"><strong>Joining Date:</strong> <span th:text="${employee.joiningDate}"></span></p>
                        <a href="/employees" class="btn btn-secondary">Back</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
