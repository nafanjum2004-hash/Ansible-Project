<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head">
    <title>Dashboard</title>
</head>
<body>
    <div th:replace="fragments/header :: body"></div>

    <div class="container mt-4">
        <div class="row mb-3">
            <div class="col-md-8">
                <h2>Dashboard</h2>
            </div>
            <div class="col-md-4 text-end">
                <a href="/employees/add" class="btn btn-success">Quick Add</a>
                <a href="/employees" class="btn btn-secondary">View All Employees</a>
            </div>
        </div>

        <div class="row g-3">
            <div class="col-md-4">
                <div class="card text-white bg-info mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Total Employees</h5>
                        <p class="card-text fs-2" th:text="${totalEmployees}">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Recent Employees</h5>
                        <div class="table-responsive">
                            <table class="table table-sm">
                                <thead>
                                    <tr>
                                        <th>Name</th>
                                        <th>Department</th>
                                        <th>Designation</th>
                                        <th>Joining Date</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="e : ${recentEmployees}">
                                        <td th:text="${e.fullName}">Name</td>
                                        <td th:text="${e.department}">Dept</td>
                                        <td th:text="${e.designation}">Role</td>
                                        <td th:text="${e.joiningDate}">2023-01-01</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
