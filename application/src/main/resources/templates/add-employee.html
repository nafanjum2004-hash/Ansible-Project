<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head">
    <title>Add Employee</title>
</head>
<body>
    <div th:replace="fragments/header :: body"></div>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <h2>Add Employee</h2>
                <form th:action="@{/employees/add}" th:object="${employee}" method="post">
                    <div class="mb-3">
                        <label class="form-label">First Name</label>
                        <input type="text" th:field="*{firstName}" class="form-control" />
                        <div class="text-danger" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Last Name</label>
                        <input type="text" th:field="*{lastName}" class="form-control" />
                        <div class="text-danger" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" th:field="*{email}" class="form-control" />
                        <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Department</label>
                        <input type="text" th:field="*{department}" class="form-control" />
                        <div class="text-danger" th:if="${#fields.hasErrors('department')}" th:errors="*{department}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Designation</label>
                        <input type="text" th:field="*{designation}" class="form-control" />
                        <div class="text-danger" th:if="${#fields.hasErrors('designation')}" th:errors="*{designation}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Joining Date</label>
                        <input type="date" th:field="*{joiningDate}" class="form-control" />
                        <div class="text-danger" th:if="${#fields.hasErrors('joiningDate')}" th:errors="*{joiningDate}"></div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="/employees" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Save Employee</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
